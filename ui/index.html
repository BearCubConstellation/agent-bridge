<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Bridge · 控制中心</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<script>
/* 防止主题切换 FOUC — 首屏前同步应用 */
(function() {
  try {
    var saved = localStorage.getItem('agentBridgeTheme');
    if (saved === 'light' || saved === 'dark') {
      document.documentElement.dataset.theme = saved;
      return;
    }
    var dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.dataset.theme = dark ? 'dark' : 'light';
  } catch (e) {
    document.documentElement.dataset.theme = 'light';
  }
})();
</script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-shell">

  <!-- ═══ Sidebar ═══ -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img class="brand-logo logo-light" src="/icon/light.png" alt="" aria-hidden="true">
      <img class="brand-logo logo-dark"  src="/icon/dark.png"  alt="" aria-hidden="true">
      <div>
        <div class="logo">agent-bridge</div>
        <div class="sidebar-sub">控制中心</div>
      </div>
    </div>

    <nav class="sidebar-nav" aria-label="主导航">
      <button class="tab-btn active" data-tab="chat" data-action="switchTab" data-tab-name="chat">
        <span class="nav-icon">CH</span>
        <span class="nav-label">聊天</span>
        <span class="nav-hint">Chat</span>
      </button>
      <button class="tab-btn" data-tab="agent" data-action="switchTab" data-tab-name="agent">
        <span class="nav-icon">AG</span>
        <span class="nav-label">Agent</span>
        <span class="nav-hint">配置</span>
      </button>
      <button class="tab-btn" data-tab="settings" data-action="switchTab" data-tab-name="settings">
        <span class="nav-icon">ST</span>
        <span class="nav-label">设置</span>
        <span class="nav-hint">Settings</span>
      </button>
    </nav>

    <div class="sidebar-spacer"></div>

    <div class="sidebar-status">
      <div class="sidebar-stat">
        <span class="sidebar-stat-label">消息</span>
        <span class="sidebar-stat-value" id="statCount">—</span>
        <span class="sidebar-stat-sub" id="statLast"></span>
      </div>
      <div class="poll-block">
        <span class="poll-dot" id="pollDot"></span>
        <span id="pollLabel">轮询</span>
        <button class="poll-toggle" id="pollBtn" data-action="togglePoll" title="切换轮询">∥</button>
      </div>
    </div>

    <button class="theme-toggle" data-action="toggleTheme" type="button" title="切换明暗色模式" aria-label="切换明暗色模式">☀</button>
  </aside>

  <!-- ═══ Main Area ═══ -->
  <div class="main-area">
    <div class="config-banner" id="configBanner"></div>

    <main class="main-content">

      <!-- Chat pane (三视图统一动态渲染) -->
      <section class="tab-pane active" id="pane-chat" aria-label="聊天">
        <div id="chatView"></div>
      </section>

      <!-- Agent pane -->
      <section class="tab-pane" id="pane-agent" aria-label="Agent 配置">
        <div id="agentView"></div>
      </section>

      <!-- Settings pane -->
      <section class="tab-pane" id="pane-settings" aria-label="设置">
        <div id="settingsView"></div>
      </section>

    </main>
  </div>

</div>

<!-- Modal & Toast 容器（由 JS 动态填充） -->
<div id="modalRoot"></div>
<div id="toastRoot" class="toast-root"></div>

<script src="app.js"></script>
</body>
</html>
