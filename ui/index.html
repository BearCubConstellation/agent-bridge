<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Bridge · 控制中心</title>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121e;
  --surface2: #1a1a2e;
  --surface3: #222236;
  --text: #e0e0f0;
  --text2: #8888a0;
  --text3: #5a5a70;
  --border: #1e1e32;
  --accent: #e94560;
  --green: #4ecdc4;
  --red: #ff6b6b;
  --amber: #ffd93d;
  --font: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
  --font-ui: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  --radius: 8px;
  --radius-sm: 5px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: var(--font-ui); line-height: 1.5;
  min-height: 100vh; display: flex; flex-direction: column;
}

/* ═══ Header ═══ */
.header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.logo {
  font-family: var(--font); font-size: 1em; font-weight: 700;
  background: linear-gradient(135deg, var(--red), #e94560);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-sub { color: var(--text3); font-size: 0.78em; font-family: var(--font); }
.header-right { display: flex; gap: 6px; }

.agent-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 0.78em; padding: 3px 10px;
  background: var(--surface2); border-radius: 20px;
  border: 1px solid var(--border); cursor: pointer;
  transition: all 0.2s; position: relative;
}
.agent-badge:hover { border-color: var(--text3); background: var(--surface3); }
.agent-badge.editing { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.agent-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* ═══ Edit popup (same as before) ═══ */
.edit-popup {
  position: absolute; top: calc(100% + 6px); right: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px; min-width: 200px;
  z-index: 200; box-shadow: 0 8px 24px rgba(0,0,0,0.4); display: none;
}
.edit-popup.open { display: block; }
.edit-field { margin-bottom: 8px; }
.edit-field label {
  display: block; font-size: 0.7em; color: var(--text3);
  margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px;
}
.edit-field input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); padding: 6px 9px;
  font-size: 0.82em; font-family: var(--font-ui); outline: none;
  transition: border-color 0.2s;
}
.edit-field input:focus { border-color: var(--accent); }
.edit-field .field-error { border-color: var(--red); }
.edit-error-msg { font-size: 0.7em; color: var(--red); margin-top: 1px; min-height: 1em; }
.edit-rename-warn {
  background: rgba(255,217,61,0.1); border: 1px solid rgba(255,217,61,0.3);
  border-radius: var(--radius-sm); padding: 6px 8px; margin-bottom: 8px;
  font-size: 0.72em; color: var(--amber); line-height: 1.5;
}
.edit-popup-actions { display: flex; gap: 5px; margin-top: 8px; }
.edit-btn {
  flex: 1; padding: 5px 8px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text2); font-size: 0.78em; cursor: pointer;
  transition: all 0.15s; font-family: var(--font-ui);
}
.edit-btn:hover { background: var(--surface3); color: var(--text); }
.edit-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.edit-status { font-size: 0.72em; margin-top: 5px; min-height: 1.1em; }
.edit-status.ok { color: var(--green); }
.edit-status.error { color: var(--red); }

/* ═══ Agent cards ═══ */
.cards-bar {
  background: var(--surface);
  padding: 10px 20px;
  display: flex; gap: 10px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.agent-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  min-width: 180px;
  flex-shrink: 0;
}
.agent-card-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px;
}
.agent-card-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.agent-card-name {
  font-weight: 600; font-size: 0.88em;
}
.agent-card-row {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.75em; color: var(--text3); padding: 2px 0;
}
.agent-card-row .label { color: var(--text3); min-width: 50px; }
.agent-card-row .val { color: var(--text2); font-family: var(--font); font-size: 0.95em; }
.agent-card-row .val.ok { color: var(--green); }
.agent-card-row .val.warn { color: var(--amber); }

/* ═══ Tabs ═══ */
.tab-bar {
  background: var(--surface);
  display: flex;
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
}
.tab-btn {
  background: none; border: none;
  color: var(--text3); padding: 10px 18px;
  font-size: 0.82em; font-family: var(--font-ui);
  cursor: pointer; border-bottom: 2px solid transparent;
  transition: all 0.15s;
}
.tab-btn:hover { color: var(--text2); }
.tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }

/* ═══ Compose bar ═══ */
.compose-bar {
  padding: 8px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.compose-bar select {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  padding: 7px 10px; font-size: 0.82em; font-family: var(--font-ui);
  outline: none; min-width: 90px;
}
.compose-bar input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  padding: 7px 12px; font-size: 0.85em; font-family: var(--font-ui);
  outline: none; max-width: 500px;
}
.compose-bar input:focus { border-color: var(--accent); }
.compose-btn {
  background: var(--accent); border: none; color: #fff;
  padding: 7px 16px; border-radius: var(--radius-sm);
  font-size: 0.82em; cursor: pointer; font-family: var(--font-ui);
  transition: opacity 0.15s;
}
.compose-btn:hover { opacity: 0.9; }
.compose-btn:disabled { opacity: 0.4; cursor: default; }

/* ═══ Main content ═══ */
.main-content {
  flex: 1;
  overflow-y: auto;
}
.tab-pane { display: none; padding: 16px 20px; }
.tab-pane.active { display: block; }

/* ═══ Chat pane ═══ */
.chat-area { max-width: 860px; margin: 0 auto; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty-state .icon { font-size: 2.5em; margin-bottom: 10px; opacity: 0.4; }
.empty-state h3 { color: var(--text2); font-weight: 500; margin-bottom: 6px; font-size: 1em; }
.empty-state p { font-size: 0.85em; color: var(--text3); }

.date-separator { text-align: center; margin: 20px 0 12px; position: relative; }
.date-separator::before {
  content: ''; position: absolute; left: 0; right: 0; top: 50%;
  height: 1px; background: var(--border);
}
.date-separator span {
  background: var(--bg); color: var(--text3); font-size: 0.75em;
  font-family: var(--font); padding: 0 10px; position: relative;
}

.message-group { display: flex; gap: 8px; margin-bottom: 12px; animation: fadeIn 0.2s ease; }
.message-group.left { flex-direction: row; }
.message-group.right { flex-direction: row-reverse; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.msg-avatar {
  flex-shrink: 0; width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.78em; font-weight: 700; font-family: var(--font);
  margin-top: 2px; user-select: none; border-width: 1px; border-style: solid;
}
.msg-bubble {
  max-width: 72%; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 14px;
}
.msg-bubble.left { border-top-left-radius: 3px; }
.msg-bubble.right { border-top-right-radius: 3px; }
.msg-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.msg-sender { font-size: 0.8em; font-weight: 600; }
.msg-time { font-size: 0.7em; color: var(--text3); font-family: var(--font); }
.msg-source { font-size: 0.68em; color: var(--text3); margin-left: auto; opacity: 0.5; }
.msg-text { font-size: 0.88em; line-height: 1.6; color: var(--text); word-break: break-word; white-space: pre-wrap; }

/* ═══ Controls bar (search + archive) ═══ */
.chat-controls {
  display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
}
.chat-controls input, .chat-controls select {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  padding: 6px 10px; font-size: 0.8em; font-family: var(--font-ui);
  outline: none; transition: border-color 0.2s;
}
.chat-controls input:focus, .chat-controls select:focus { border-color: var(--accent); }
.chat-search { flex: 1; min-width: 150px; max-width: 280px; }
.chat-archive { min-width: 140px; }
.tool-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); padding: 6px 10px;
  border-radius: var(--radius-sm); cursor: pointer;
  font-size: 0.78em; transition: all 0.15s; font-family: var(--font-ui);
}
.tool-btn:hover { background: var(--surface3); color: var(--text); }

/* ═══ Activity pane ═══ */
.activity-timeline { max-width: 700px; margin: 0 auto; }
.activity-item {
  display: flex; gap: 12px; padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.activity-time {
  font-family: var(--font); font-size: 0.72em;
  color: var(--text3); min-width: 60px; flex-shrink: 0;
  padding-top: 2px;
}
.activity-icon { flex-shrink: 0; font-size: 0.9em; width: 20px; text-align: center; }
.activity-body { flex: 1; }
.activity-title {
  font-size: 0.82em; color: var(--text2);
}
.activity-detail {
  font-size: 0.75em; color: var(--text3); margin-top: 2px;
  font-family: var(--font);
}
.activity-detail.error { color: var(--red); }
.activity-empty {
  text-align: center; padding: 60px 20px; color: var(--text3);
}

/* ═══ Settings pane ═══ */
.settings-area { max-width: 700px; margin: 0 auto; }
.settings-area h3 {
  font-size: 0.85em; color: var(--text2);
  margin-bottom: 10px; font-weight: 500;
}
.yaml-editor {
  width: 100%; min-height: 300px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  font-family: var(--font); font-size: 0.78em; line-height: 1.6;
  padding: 14px; resize: vertical; outline: none;
  white-space: pre; overflow-x: auto;
}
.yaml-editor:focus { border-color: var(--accent); }
.settings-actions { margin-top: 10px; display: flex; gap: 8px; }

/* ═══ Footer ═══ */
.footer {
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 7px 20px;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 0.74em; color: var(--text3); font-family: var(--font);
}
.footer-left { display: flex; align-items: center; gap: 10px; }
.footer-right { display: flex; align-items: center; gap: 8px; }
.footer-stat { color: var(--text2); }
.poll-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.poll-dot.active { background: var(--green); }
.poll-dot.stopped { background: var(--text3); }
.poll-toggle {
  background: none; border: 1px solid var(--border); color: var(--text3);
  padding: 1px 7px; border-radius: 3px; cursor: pointer;
  font-size: 0.9em; font-family: var(--font); transition: all 0.12s;
}
.poll-toggle:hover { background: var(--surface2); color: var(--text2); }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@media (max-width: 600px) {
  .header { padding: 8px 12px; }
  .cards-bar { padding: 8px 12px; }
  .tab-bar { padding: 0 12px; }
  .tab-btn { padding: 8px 12px; font-size: 0.78em; }
  .compose-bar { padding: 6px 12px; flex-wrap: wrap; }
  .compose-bar input { max-width: 100%; }
  .main-content { padding: 0; }
  .tab-pane { padding: 12px; }
  .msg-bubble { max-width: 85%; }
  .agent-card { min-width: 140px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <span class="logo">agent-bridge</span>
    <span class="header-sub">控制中心</span>
  </div>
  <div class="header-right" id="agentBadgeContainer"></div>
</header>

<div class="cards-bar" id="cardsBar"></div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="chat">💬 聊天</button>
  <button class="tab-btn" data-tab="activity">📡 活动</button>
  <button class="tab-btn" data-tab="settings">⚙ 设置</button>
</div>

<div class="compose-bar">
  <select id="composeAgent"></select>
  <input type="text" id="composeInput" placeholder="输入消息，按 Enter 发送…" />
  <button class="compose-btn" id="composeBtn">发送→</button>
</div>

<div class="main-content">

  <!-- ═══ Chat pane ═══ -->
  <div class="tab-pane active" id="pane-chat">
    <div class="chat-area">
      <div class="chat-controls">
        <input class="chat-search" id="searchInput" type="text" placeholder="搜索消息…" />
        <select class="chat-archive" id="archiveSelect">
          <option value="__active__">📄 当前对话</option>
        </select>
        <button class="tool-btn" id="archiveBtn" title="归档">📦</button>
        <button class="tool-btn" id="refreshBtn" title="刷新">⟳</button>
      </div>
      <div id="chatArea">
        <div class="empty-state">
          <div class="icon">💬</div>
          <h3>暂无消息</h3>
          <p>等 agent 双方开始通信后，消息将在这里显示。</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ Activity pane ═══ -->
  <div class="tab-pane" id="pane-activity">
    <div class="activity-timeline" id="activityArea">
      <div class="activity-empty">
        <div class="icon" style="font-size:2.5em;opacity:0.4">📡</div>
        <h3 style="color:var(--text2);font-weight:500;margin-top:8px;font-size:1em">暂无活动记录</h3>
      </div>
    </div>
  </div>

  <!-- ═══ Settings pane ═══ -->
  <div class="tab-pane" id="pane-settings">
    <div class="settings-area">
      <h3>bridge.yaml</h3>
      <textarea class="yaml-editor" id="yamlEditor" spellcheck="false" readonly></textarea>
    </div>
  </div>

</div>

<footer class="footer">
  <div class="footer-left">
    <span>消息</span>
    <span class="footer-stat" id="statCount">—</span>
    <span class="footer-stat" id="statLast"></span>
  </div>
  <div class="footer-right">
    <span class="poll-dot" id="pollDot"></span>
    <span id="pollLabel">轮询</span>
    <button class="poll-toggle" id="pollBtn">∥</button>
  </div>
</footer>

<script>
// ============================================================
//  Agent Bridge · Control Center
// ============================================================

const VALID_ID_RE = /^[a-zA-Z0-9_-]+$/;

let state = {
  messages: [], agents: [], agentIds: [], agentMap: {}, agentAlias: {},
  archive: '__active__', searchQuery: '',
  autoRefresh: true, pollInterval: null, pollStatusTimer: null,
  editingBadge: null, popupCloseHandler: null,
  activeTab: 'chat',
};

const $ = s => document.querySelector(s);
const chatArea = $('#chatArea');
const searchInput = $('#searchInput');
const archiveSelect = $('#archiveSelect');
const refreshBtn = $('#refreshBtn');
const archiveBtn = $('#archiveBtn');
const cardsBar = $('#cardsBar');
const badgeContainer = $('#agentBadgeContainer');
const composeAgent = $('#composeAgent');
const composeInput = $('#composeInput');
const composeBtn = $('#composeBtn');
const statCount = $('#statCount');
const statLast = $('#statLast');
const pollDot = $('#pollDot');
const pollLabel = $('#pollLabel');
const pollBtn = $('#pollBtn');
const activityArea = $('#activityArea');
const yamlEditor = $('#yamlEditor');

// ═══ API ═══
async function apiGet(p) { try { const r = await fetch(p); return await r.json(); } catch(e) { return null; } }
async function apiPost(p, d) {
  try { const r = await fetch(p, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d)}); return await r.json(); }
  catch(e) { return null; }
}

// ═══ Config ═══
async function loadConfig() {
  const data = await apiGet('/api/config');
  if (!data || !data.ok) return;
  const agents = data.agents || [];
  state.agents = agents;
  state.agentIds = agents.map(a => a.id);
  const newMap = {};
  for (const a of agents) newMap[a.id] = {display_name: a.display_name || a.id, color: a.color || '#8888a0'};
  const oldAliases = state.agentAlias || {};
  state.agentAlias = {};
  for (const [oldId, info] of Object.entries(oldAliases)) {
    const cur = newMap[info.id] || newMap[oldId];
    if (cur) state.agentAlias[oldId] = {...cur, id: info.id || oldId};
  }
  state.agentMap = newMap;
  renderBadges();
  renderCards();
  renderComposeSelect();
}

// ═══ Badges (header) ═══
function renderBadges() {
  badgeContainer.innerHTML = '';
  for (const a of state.agents) {
    const el = document.createElement('div');
    el.className = 'agent-badge'; el.dataset.agentId = a.id;
    el.innerHTML = `<span class="agent-dot" style="background:${a.color}"></span><span>${esc(a.display_name||a.id)}</span>`;
    el.addEventListener('click', e => { e.stopPropagation(); openEditPopup(el, a); });
    badgeContainer.appendChild(el);
  }
}

// ═══ Agent cards (dashboard) ═══
async function renderCards() {
  cardsBar.innerHTML = '';
  // Fetch poll status for wakeup indicators
  const pollData = await apiGet('/api/poll');
  for (const a of state.agents) {
    const cfg = await apiGet('/api/config');
    const fullCfg = cfg && cfg.agents ? cfg.agents.find(x => x.id === a.id) : null;
    const card = document.createElement('div');
    card.className = 'agent-card';
    card.innerHTML = `
      <div class="agent-card-header">
        <span class="agent-card-dot" style="background:${a.color}"></span>
        <span class="agent-card-name" style="color:${a.color}">${esc(a.display_name || a.id)}</span>
      </div>
      <div class="agent-card-row"><span class="label">ID</span><span class="val">${esc(a.id)}</span></div>
      <div class="agent-card-row"><span class="label">来自</span><span class="val">${esc(fullCfg?.filter_from || '—')}</span></div>
      <div class="agent-card-row"><span class="label">游标</span><span class="val">${esc(fullCfg?.cursor || 'line')}</span></div>
      <div class="agent-card-row">
        <span class="label">唤醒</span>
        <span class="val ${fullCfg?.wakeup?.url ? 'ok' : 'warn'}">${fullCfg?.wakeup?.url ? '✓ 已配置' : '✗ 未配置'}</span>
      </div>`;
    cardsBar.appendChild(card);
  }
}

// ═══ Compose select ═══
function renderComposeSelect() {
  composeAgent.innerHTML = '';
  for (const a of state.agents) {
    const opt = document.createElement('option');
    opt.value = a.id;
    opt.textContent = a.display_name || a.id;
    composeAgent.appendChild(opt);
  }
}

composeInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
composeBtn.addEventListener('click', sendMessage);

async function sendMessage() {
  const aid = composeAgent.value;
  const text = composeInput.value.trim();
  if (!text) return;
  composeBtn.disabled = true;
  const result = await apiPost('/api/send', {agent_id: aid, text});
  composeBtn.disabled = false;
  if (result && result.ok) {
    composeInput.value = '';
    if (state.activeTab === 'chat') loadMessages();
  }
}

// ═══ Edit popup ═══
function openEditPopup(el, agent) {
  closeEditPopup();
  state.editingBadge = agent.id;
  el.classList.add('editing');
  const popup = document.createElement('div');
  popup.className = 'edit-popup open';
  popup.dataset.agentId = agent.id;
  popup.innerHTML = `
    <div class="edit-field">
      <label>Agent ID</label>
      <input type="text" class="edit-id-input" value="${esc(agent.id)}" placeholder="e.g. momo">
      <div class="edit-error-msg"></div>
    </div>
    <div class="edit-field">
      <label>名称</label>
      <input type="text" class="edit-name-input" value="${esc(agent.display_name||agent.id)}" placeholder="Display name">
    </div>
    <div class="edit-field">
      <label>颜色</label>
      <input type="text" class="edit-color-input" value="${agent.color}" placeholder="#rrggbb" style="font-family:var(--font);font-size:0.8em">
    </div>
    <div class="edit-rename-warn" style="display:none">⚠️ 修改 ID 后需同步更新对方配置中的 filter_from</div>
    <div class="edit-popup-actions">
      <button class="edit-btn cancel-btn">取消</button>
      <button class="edit-btn primary save-btn">保存</button>
    </div>
    <div class="edit-status"></div>`;
  el.appendChild(popup);
  const idI = popup.querySelector('.edit-id-input');
  idI.focus(); idI.setSelectionRange(idI.value.length, idI.value.length);
  idI.addEventListener('input', () => {
    popup.querySelector('.edit-rename-warn').style.display = (idI.value.trim() !== agent.id) ? 'block' : 'none';
    validateId(idI);
  });
  popup.querySelector('.save-btn').addEventListener('click', () => saveAgent(agent, popup));
  popup.querySelector('.cancel-btn').addEventListener('click', closeEditPopup);
  popup.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveAgent(agent, popup); if (e.key === 'Escape') closeEditPopup(); });
  });
  setTimeout(() => {
    if (state.popupCloseHandler) document.removeEventListener('click', state.popupCloseHandler);
    state.popupCloseHandler = e => { if (!e.target.closest('.edit-popup') && !e.target.closest('.agent-badge.editing')) closeEditPopup(); };
    document.addEventListener('click', state.popupCloseHandler);
  }, 10);
}

function validateId(i) {
  const err = i.parentElement.querySelector('.edit-error-msg');
  const v = i.value.trim();
  if (!v) { err.textContent = '不能为空'; i.classList.add('field-error'); return false; }
  if (!VALID_ID_RE.test(v)) { err.textContent = '字母、数字、-、_ 仅'; i.classList.add('field-error'); return false; }
  err.textContent = ''; i.classList.remove('field-error'); return true;
}

function closeEditPopup() {
  if (state.popupCloseHandler) { document.removeEventListener('click', state.popupCloseHandler); state.popupCloseHandler = null; }
  document.querySelectorAll('.edit-popup').forEach(e => e.remove());
  document.querySelectorAll('.agent-badge.editing').forEach(e => e.classList.remove('editing'));
  state.editingBadge = null;
}

async function saveAgent(agent, popup) {
  const st = popup.querySelector('.edit-status');
  const idI = popup.querySelector('.edit-id-input');
  const nameI = popup.querySelector('.edit-name-input');
  const colI = popup.querySelector('.edit-color-input');
  const newId = idI.value.trim();
  const newName = nameI.value.trim();
  const newColor = colI.value.trim();
  if (!validateId(idI)) return;
  if (!/^#[0-9a-fA-F]{6}$/.test(newColor)) { st.textContent = '颜色格式 #rrggbb'; st.className='edit-status error'; return; }
  st.textContent = '保存…'; st.className = 'edit-status';
  const payload = state.agents.map(a => {
    if (a.id === agent.id) return {id: newId, old_id: (newId!==agent.id)?agent.id:undefined, display_name: newName||newId, color: newColor};
    return {id: a.id, display_name: a.display_name, color: a.color};
  });
  const r = await apiPost('/api/config', {agents: payload});
  if (r && r.ok) {
    st.textContent = '✓ 已保存'; st.className = 'edit-status ok';
    await loadConfig(); await loadMessages(); await renderCards();
    setTimeout(closeEditPopup, 700);
  } else { st.textContent = '失败: '+(r?.error||'unknown'); st.className='edit-status error'; }
}

// ═══ Messages ═══
function resolveAgent(sender) { return state.agentMap[sender] || state.agentAlias[sender] || {display_name:sender,color:'#8888a0'}; }

async function loadMessages() {
  const p = new URLSearchParams();
  if (state.archive !== '__active__') p.set('archive', state.archive);
  if (state.searchQuery) p.set('q', state.searchQuery);
  p.set('limit','500');
  const data = await apiGet(`/api/messages?${p}`);
  if (!data || !data.ok) return;
  state.messages = data.messages || [];
  // Build aliases
  for (const m of state.messages) {
    const s = m.from; if (!s || state.agentMap[s] || state.agentAlias[s]) continue;
    let best = null, bestScore = 0;
    for (const [kid] of Object.entries(state.agentMap)) {
      if (s.startsWith(kid) || kid.startsWith(s)) { const sc = Math.min(s.length, kid.length); if (sc > bestScore) { bestScore = sc; best = kid; } }
    }
    state.agentAlias[s] = best ? {...state.agentMap[best], id: best} : {display_name: s, color: '#8888a0', id: s};
  }
  renderMessages(); updateStats();
}

function renderMessages() {
  const msgs = state.messages;
  if (!msgs.length) {
    chatArea.innerHTML = '<div class="empty-state"><div class="icon">💬</div><h3>暂无消息</h3><p>等 agent 双方开始通信后，消息将在这里显示。</p></div>';
    return;
  }
  let html = '', lastDate = '';
  for (const m of msgs) {
    const sender = m.from || 'unknown', ts = m.ts || '', date = ts.slice(0,10), time = ts.slice(11,19);
    const text = m.msg || '', source = m._source === 'active' ? '' : `📦 ${m._source}`;
    if (date !== lastDate) { html += `<div class="date-separator"><span>${date}</span></div>`; lastDate = date; }
    const idx = state.agentIds.indexOf(sender);
    const side = (idx >=0 && state.agentIds.length>=2) ? (idx%2===0?'left':'right') : 'left';
    const info = resolveAgent(sender), color = info.color;
    html += `<div class="message-group ${side}">
      <div class="msg-avatar ${side}" style="background:${color}22;color:${color};border-color:${color}44">${esc(sender[0].toUpperCase())}</div>
      <div class="msg-bubble ${side}">
        <div class="msg-header">
          <span class="msg-sender" style="color:${color}">${esc(info.display_name)}</span>
          <span class="msg-time">${time}</span>
          ${source?`<span class="msg-source">${source}</span>`:''}
        </div>
        <div class="msg-text">${esc(text)}</div>
      </div></div>`;
  }
  chatArea.innerHTML = html;
}

function updateStats() {
  const ms = state.messages;
  statCount.textContent = ms.length;
  statLast.textContent = ms.length ? '· 最后 ' + (ms[ms.length-1].ts||'').slice(11,19) : '';
}

// ═══ Search / Archive / Refresh ═══
let searchTimeout;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => { state.searchQuery = searchInput.value.trim(); loadMessages(); }, 300);
});
archiveSelect.addEventListener('change', () => { state.archive = archiveSelect.value; loadMessages(); });
refreshBtn.addEventListener('click', refreshAll);

archiveBtn.addEventListener('click', async () => {
  if (!confirm('归档当前对话？')) return;
  const r = await apiPost('/api/archive', {});
  if (r && r.ok) { await loadArchives(); await refreshAll(); }
});

async function loadArchives() {
  const data = await apiGet('/api/status');
  if (!data || !data.ok) return;
  archiveSelect.innerHTML = '<option value="__active__">📄 当前对话</option>';
  if (data.history) {
    for (const h of data.history) {
      const opt = document.createElement('option');
      opt.value = h.name; opt.textContent = `📦 ${h.name.replace('.jsonl','')} (${h.count} 条)`;
      archiveSelect.appendChild(opt);
    }
  }
}

// ═══ Activity ═══
async function loadActivity() {
  const data = await apiPost('/api/poll/history', {limit: 50});
  if (!data || !data.ok || !data.history || !data.history.length) {
    activityArea.innerHTML = '<div class="activity-empty"><div style="font-size:2.5em;opacity:0.4">📡</div><h3 style="color:var(--text2);font-weight:500;margin-top:8px;font-size:1em">暂无活动记录</h3><p style="color:var(--text3);font-size:0.85em;margin-top:4px">轮询运行后这里会显示检查结果。</p></div>';
    return;
  }
  let html = '';
  for (const h of data.history.slice().reverse()) {
    const ts = h.ts || '', time = ts.slice(11,19);
    let icon = '○', title = '轮询检查', detail = '无新消息', cls = '';
    if (h.archived) { icon = '📦'; title = '归档'; detail = `已归档为 ${h.archived}`; }
    else if (h.delivered) { icon = '→'; title = `发送 ${h.new_msgs} 条消息给 ${h.to_agent}`; detail = '已投递'; }
    else if (h.error) { icon = '✗'; title = '轮询失败'; detail = h.error; cls = 'error'; }
    html += `<div class="activity-item">
      <span class="activity-time">${time}</span>
      <span class="activity-icon">${icon}</span>
      <div class="activity-body">
        <div class="activity-title">${title}</div>
        <div class="activity-detail ${cls}">${detail}</div>
      </div></div>`;
  }
  activityArea.innerHTML = html;
}

// ═══ Settings (yaml) ═══
async function loadYaml() {
  const data = await apiGet('/api/bridge/yaml');
  if (data && data.ok) yamlEditor.value = data.yaml;
  else yamlEditor.value = '# bridge.yaml not found';
}

// ═══ Poll control ═══
async function loadPollStatus() {
  const d = await apiGet('/api/poll');
  if (!d || !d.ok) return;
  const run = d.running;
  pollDot.className = 'poll-dot ' + (run ? 'active' : 'stopped');
  pollLabel.textContent = run ? '轮询中' : '已暂停';
  pollBtn.textContent = run ? '∥' : '▶';
}
pollBtn.addEventListener('click', async () => {
  const d = await apiGet('/api/poll');
  if (d && d.running) await apiPost('/api/poll/stop', {});
  else await apiPost('/api/poll/start', {});
  await loadPollStatus();
  await renderCards();
});
pollBtn.addEventListener('dblclick', async () => {
  const r = await apiPost('/api/poll/now', {});
  if (r && r.ok) { await refreshAll(); await loadActivity(); }
});

// ═══ Tab switching ═══
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    const pane = document.getElementById('pane-' + btn.dataset.tab);
    if (pane) pane.classList.add('active');
    state.activeTab = btn.dataset.tab;
    // Lazy load
    if (btn.dataset.tab === 'activity') loadActivity();
    if (btn.dataset.tab === 'settings') loadYaml();
  });
});

// ═══ Auto refresh ═══
function startAutoRefresh() {
  stopAutoRefresh();
  state.pollInterval = setInterval(() => { if (!document.hidden) refreshAll(); }, 5000);
  state.pollStatusTimer = setInterval(() => { if (!document.hidden) loadPollStatus(); }, 3000);
}
function stopAutoRefresh() {
  if (state.pollInterval) { clearInterval(state.pollInterval); state.pollInterval = null; }
  if (state.pollStatusTimer) { clearInterval(state.pollStatusTimer); state.pollStatusTimer = null; }
}
document.addEventListener('visibilitychange', () => { if (!document.hidden && state.autoRefresh) refreshAll(); });
async function refreshAll() { await Promise.all([loadConfig(), loadMessages(), loadStatus(), loadPollStatus()]); }
async function loadStatus() {
  const d = await apiGet('/api/status');
  if (!d || !d.ok) return;
  statCount.textContent = d.active.count;
}

// ═══ Init ═══
async function init() {
  await loadConfig();
  await loadArchives();
  await refreshAll();
  startAutoRefresh();
  loadPollStatus();
}
init();
</script>
</body>
</html>
