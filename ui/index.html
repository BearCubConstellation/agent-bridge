<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Bridge · 控制中心</title>
<script>
(function() {
  try {
    const saved = localStorage.getItem('agentBridgeTheme');
    if (saved === 'light' || saved === 'dark') {
      document.documentElement.dataset.theme = saved;
      return;
    }
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
      document.documentElement.dataset.theme = 'light';
    }
  } catch (e) {}
})();
</script>
<style>
:root {
  color-scheme: dark;
  --bg: #0a0a0f;
  --surface: #12121e;
  --surface2: #1a1a2e;
  --surface3: #222236;
  --text: #e0e0f0;
  --text2: #8888a0;
  --text3: #5a5a70;
  --border: #1e1e32;
  --accent: #e94560;
  --green: #4ecdc4;
  --red: #ff6b6b;
  --amber: #ffd93d;
  --font: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
  --font-ui: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  --radius: 8px;
  --radius-sm: 5px;
}
html[data-theme="light"] {
  color-scheme: light;
  --bg: #f6f7fb;
  --surface: #ffffff;
  --surface2: #eef1f7;
  --surface3: #e2e7f0;
  --text: #182033;
  --text2: #526078;
  --text3: #7a8496;
  --border: #d9dfeb;
  --accent: #d9365a;
  --green: #168f86;
  --red: #d64545;
  --amber: #9a6a00;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: var(--font-ui); line-height: 1.5;
  min-height: 100vh; display: flex; flex-direction: column;
}

/* ═══ Header ═══ */
.header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex; align-items: center; justify-content: space-between; gap: 18px;
  position: sticky; top: 0; z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.logo {
  font-family: var(--font); font-size: 1em; font-weight: 700;
  background: linear-gradient(135deg, var(--red), #e94560);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-sub { color: var(--text3); font-size: 0.78em; font-family: var(--font); }
.header-right { display: flex; align-items: center; gap: 8px; }
.badge-list { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.theme-toggle {
  width: 30px; height: 30px; flex: 0 0 30px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text2);
  cursor: pointer; font-size: 0.9em; font-family: var(--font-ui);
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.theme-toggle:hover { background: var(--surface3); color: var(--text); border-color: var(--text3); }

.agent-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 0.78em; padding: 3px 10px;
  background: var(--surface2); border-radius: 20px;
  border: 1px solid var(--border); cursor: pointer;
  transition: all 0.2s; position: relative;
}
.agent-badge:hover { border-color: var(--text3); background: var(--surface3); }
.agent-badge.editing { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.agent-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* ═══ Edit popup (same as before) ═══ */
.edit-popup {
  position: absolute; top: calc(100% + 6px); right: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px; min-width: 200px;
  z-index: 200; box-shadow: 0 8px 24px rgba(0,0,0,0.4); display: none;
}
.edit-popup.open { display: block; }
.edit-field { margin-bottom: 8px; }
.edit-field label {
  display: block; font-size: 0.7em; color: var(--text3);
  margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px;
}
.edit-field input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); padding: 6px 9px;
  font-size: 0.82em; font-family: var(--font-ui); outline: none;
  transition: border-color 0.2s;
}
.edit-field input:focus { border-color: var(--accent); }
.edit-field .field-error { border-color: var(--red); }
.edit-error-msg { font-size: 0.7em; color: var(--red); margin-top: 1px; min-height: 1em; }
.edit-rename-warn {
  background: rgba(255,217,61,0.1); border: 1px solid rgba(255,217,61,0.3);
  border-radius: var(--radius-sm); padding: 6px 8px; margin-bottom: 8px;
  font-size: 0.72em; color: var(--amber); line-height: 1.5;
}
.edit-popup-actions { display: flex; gap: 5px; margin-top: 8px; }
.edit-btn {
  flex: 1; padding: 5px 8px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text2); font-size: 0.78em; cursor: pointer;
  transition: all 0.15s; font-family: var(--font-ui);
}
.edit-btn:hover { background: var(--surface3); color: var(--text); }
.edit-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.edit-status { font-size: 0.72em; margin-top: 5px; min-height: 1.1em; }
.edit-status.ok { color: var(--green); }
.edit-status.error { color: var(--red); }

/* ═══ Agent cards ═══ */
.cards-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 10px;
}
.agent-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  min-width: 0;
}
.agent-card-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px;
}
.agent-card-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.agent-card-name {
  font-weight: 600; font-size: 0.88em;
}
.agent-card-row {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.75em; color: var(--text3); padding: 2px 0;
}
.agent-card-row .label { color: var(--text3); min-width: 50px; }
.agent-card-row .val { color: var(--text2); font-family: var(--font); font-size: 0.95em; }
.agent-card-row .val.ok { color: var(--green); }
.agent-card-row .val.warn { color: var(--amber); }

/* ═══ Tabs ═══ */
.tab-bar {
  display: flex;
  align-self: stretch;
  justify-content: center;
  flex: 1;
}
.tab-btn {
  background: none; border: none;
  color: var(--text3); padding: 10px 18px;
  font-size: 0.82em; font-family: var(--font-ui);
  cursor: pointer; border-bottom: 2px solid transparent;
  transition: all 0.15s;
}
.tab-btn:hover { color: var(--text2); }
.tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }

.agent-area {
  max-width: 1200px;
  margin: 0 auto;
}
.agent-page-badges {
  justify-content: flex-start;
  margin-bottom: 12px;
}
.agent-section {
  margin-bottom: 18px;
}
.agent-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}
.agent-section-title {
  color: var(--text3);
  font-size: 0.78em;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.scan-btn {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text2);
  padding: 5px 10px; border-radius: var(--radius-sm); cursor: pointer;
  font-size: 0.76em; transition: all 0.15s; font-family: var(--font-ui);
}
.scan-btn:hover { border-color: var(--text3); color: var(--text); background: var(--surface3); }
.discover-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 10px;
}
.discover-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 11px 13px;
}
.discover-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 7px;
}
.discover-name {
  font-weight: 600;
  font-size: 0.86em;
}
.discover-pill {
  border: 1px solid var(--border);
  border-radius: 999px;
  color: var(--text3);
  font-size: 0.68em;
  padding: 2px 7px;
  white-space: nowrap;
}
.discover-pill.configured {
  color: var(--green);
  border-color: rgba(78,205,196,0.35);
  background: rgba(78,205,196,0.08);
}
.discover-pill.sample {
  color: var(--amber);
  border-color: rgba(255,217,61,0.35);
  background: rgba(255,217,61,0.08);
}
.discover-meta {
  color: var(--text3);
  font-size: 0.74em;
  line-height: 1.45;
  word-break: break-word;
}
.discover-empty {
  color: var(--text3);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  padding: 14px;
  font-size: 0.82em;
}

.config-banner {
  display: none; background: rgba(255,217,61,0.08); border-bottom: 1px solid rgba(255,217,61,0.18);
  padding: 10px 20px; color: var(--amber); font-size: 0.82em;
}
.config-banner.show { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.config-banner button {
  background: rgba(255,217,61,0.12); border: 1px solid rgba(255,217,61,0.35);
  color: var(--amber); border-radius: var(--radius-sm); padding: 5px 10px; cursor: pointer;
}
.config-checklist {
  background: rgba(255,217,61,0.06); border: 1px solid rgba(255,217,61,0.22);
  border-radius: var(--radius); padding: 10px 12px; margin-bottom: 12px; color: var(--text2);
  font-size: 0.82em;
}
.config-checklist-title { color: var(--amber); font-weight: 600; margin-bottom: 6px; }
.config-checklist div { margin: 3px 0; }

/* ═══ Compose bar ═══ */
.compose-bar {
  padding: 8px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.compose-bar select {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  padding: 7px 10px; font-size: 0.82em; font-family: var(--font-ui);
  outline: none; min-width: 90px;
}
.compose-bar input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  padding: 7px 12px; font-size: 0.85em; font-family: var(--font-ui);
  outline: none; max-width: 500px;
}
.compose-bar input:focus { border-color: var(--accent); }
.compose-btn {
  background: var(--accent); border: none; color: #fff;
  padding: 7px 16px; border-radius: var(--radius-sm);
  font-size: 0.82em; cursor: pointer; font-family: var(--font-ui);
  transition: opacity 0.15s;
}
.compose-btn:hover { opacity: 0.9; }
.compose-btn:disabled { opacity: 0.4; cursor: default; }

/* ═══ Main content ═══ */
.main-content {
  flex: 1;
  overflow-y: auto;
}
.tab-pane { display: none; padding: 16px 20px; }
.tab-pane.active { display: block; }

/* ═══ Chat pane ═══ */
.chat-area { max-width: 860px; margin: 0 auto; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty-state .icon { font-size: 2.5em; margin-bottom: 10px; opacity: 0.4; }
.empty-state h3 { color: var(--text2); font-weight: 500; margin-bottom: 6px; font-size: 1em; }
.empty-state p { font-size: 0.85em; color: var(--text3); }

.date-separator { text-align: center; margin: 20px 0 12px; position: relative; }
.date-separator::before {
  content: ''; position: absolute; left: 0; right: 0; top: 50%;
  height: 1px; background: var(--border);
}
.date-separator span {
  background: var(--bg); color: var(--text3); font-size: 0.75em;
  font-family: var(--font); padding: 0 10px; position: relative;
}

.message-group { display: flex; gap: 8px; margin-bottom: 12px; animation: fadeIn 0.2s ease; }
.message-group.left { flex-direction: row; }
.message-group.right { flex-direction: row-reverse; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.msg-avatar {
  flex-shrink: 0; width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.78em; font-weight: 700; font-family: var(--font);
  margin-top: 2px; user-select: none; border-width: 1px; border-style: solid;
}
.msg-bubble {
  max-width: 72%; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 14px;
}
.msg-bubble.left { border-top-left-radius: 3px; }
.msg-bubble.right { border-top-right-radius: 3px; }
.msg-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.msg-sender { font-size: 0.8em; font-weight: 600; }
.msg-time { font-size: 0.7em; color: var(--text3); font-family: var(--font); }
.msg-source { font-size: 0.68em; color: var(--text3); margin-left: auto; opacity: 0.5; }
.msg-text { font-size: 0.88em; line-height: 1.6; color: var(--text); word-break: break-word; white-space: pre-wrap; }

/* ═══ Controls bar (search + archive) ═══ */
.chat-controls {
  display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
}
.chat-controls input, .chat-controls select {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  padding: 6px 10px; font-size: 0.8em; font-family: var(--font-ui);
  outline: none; transition: border-color 0.2s;
}
.chat-controls input:focus, .chat-controls select:focus { border-color: var(--accent); }
.chat-search { flex: 1; min-width: 150px; max-width: 280px; }
.chat-archive { min-width: 140px; }
.tool-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); padding: 6px 10px;
  border-radius: var(--radius-sm); cursor: pointer;
  font-size: 0.78em; transition: all 0.15s; font-family: var(--font-ui);
}
.tool-btn:hover { background: var(--surface3); color: var(--text); }

/* ═══ Chat Room Grid ═══ */
.room-grid-view { max-width: 960px; margin: 0 auto; }
.room-grid-header { display: flex; align-items: center; margin-bottom: 16px; }
.room-grid-title { font-size: 0.95em; color: var(--text2); font-weight: 600; }
.room-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 14px;
}
.room-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.room-card:hover { border-color: var(--text3); }
.room-card.active { border-color: var(--green); }
.room-card-name { font-weight: 600; font-size: 0.88em; margin-bottom: 10px; }
.room-card-agents { display: flex; gap: 8px; margin-bottom: 8px; }
.room-agent-slot {
  flex: 1; background: var(--surface2);
  border: 2px dashed var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 8px; text-align: center;
  font-size: 0.78em; color: var(--text3);
  min-height: 56px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: all 0.2s;
}
.room-agent-slot.drag-over {
  border-color: var(--accent);
  background: rgba(233,69,96,0.06);
}
.room-agent-slot.occupied {
  border-style: solid; border-color: var(--border);
}
.room-agent-slot .agent-chip {
  display: flex; align-items: center; gap: 5px; font-weight: 600;
}
.room-agent-slot .agent-chip .dot { width: 8px; height: 8px; border-radius: 50%; }
.room-agent-slot .slot-hint { font-size: 0.72em; color: var(--text3); }
.room-card-add {
  background: var(--surface);
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  aspect-ratio: 1 / 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s;
  color: var(--text3);
}
.room-card-add:hover { border-color: var(--accent); color: var(--accent); }
.room-card-add .add-icon { font-size: 2em; margin-bottom: 8px; }
.room-card-add .add-label { font-size: 0.85em; }
.room-del-btn {
  position: absolute; top: 8px; right: 8px;
  background: none; border: 1px solid transparent;
  color: var(--text3); cursor: pointer; font-size: 0.75em;
  padding: 2px 6px; border-radius: 3px; transition: all 0.15s;
}
.room-del-btn:hover { color: var(--red); border-color: var(--border); }
.room-status {
  font-size: 0.7em; padding: 2px 8px;
  border-radius: 10px; display: inline-block;
}
.room-status.waiting { color: var(--amber); background: rgba(255,217,61,0.1); }
.room-status.active { color: var(--green); background: rgba(78,205,196,0.1); }

/* Agent drag source panel */
.agent-source-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px; margin-bottom: 16px;
}
.agent-source-panel-title {
  font-size: 0.72em; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
}
.agent-source-list { display: flex; gap: 8px; flex-wrap: wrap; }
.agent-drag-chip {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px; font-size: 0.8em;
  cursor: grab; transition: all 0.15s; user-select: none;
}
.agent-drag-chip:hover { border-color: var(--text3); }
.agent-drag-chip.dragging { opacity: 0.4; }
.agent-drag-chip .dot { width: 7px; height: 7px; border-radius: 50%; }

/* Room conversation view */
.room-conv-view { max-width: 860px; margin: 0 auto; }
.conv-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
}
.back-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); padding: 5px 12px;
  border-radius: var(--radius-sm); cursor: pointer;
  font-size: 0.8em; font-family: var(--font-ui);
}
.back-btn:hover { background: var(--surface3); color: var(--text); }
.conv-room-name { font-weight: 600; font-size: 0.9em; }
.conv-agent-badges { display: flex; gap: 6px; margin-left: auto; }
.conv-agent-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 0.75em; padding: 3px 8px;
  border-radius: 12px; background: var(--surface2);
}
.conv-agent-badge .dot { width: 6px; height: 6px; border-radius: 50%; }

/* ═══ Activity pane ═══ */
.activity-timeline { max-width: 700px; margin: 0 auto; }
.activity-item {
  display: flex; gap: 12px; padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.activity-time {
  font-family: var(--font); font-size: 0.72em;
  color: var(--text3); min-width: 60px; flex-shrink: 0;
  padding-top: 2px;
}
.activity-icon { flex-shrink: 0; font-size: 0.9em; width: 20px; text-align: center; }
.activity-body { flex: 1; }
.activity-title {
  font-size: 0.82em; color: var(--text2);
}
.activity-detail {
  font-size: 0.75em; color: var(--text3); margin-top: 2px;
  font-family: var(--font);
}
.activity-detail.error { color: var(--red); }
.activity-empty {
  text-align: center; padding: 60px 20px; color: var(--text3);
}

/* ═══ Settings pane ═══ */
.settings-area { max-width: 700px; margin: 0 auto; }
.settings-area h3 {
  font-size: 0.85em; color: var(--text2);
  margin-bottom: 10px; font-weight: 500;
}
.yaml-editor {
  width: 100%; min-height: 300px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  font-family: var(--font); font-size: 0.78em; line-height: 1.6;
  padding: 14px; resize: vertical; outline: none;
  white-space: pre; overflow-x: auto;
}
.yaml-editor:focus { border-color: var(--accent); }
.settings-actions { margin-top: 10px; display: flex; gap: 8px; }

/* ═══ Footer ═══ */
.footer {
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 7px 20px;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 0.74em; color: var(--text3); font-family: var(--font);
}
.footer-left { display: flex; align-items: center; gap: 10px; }
.footer-right { display: flex; align-items: center; gap: 8px; }
.footer-stat { color: var(--text2); }
.poll-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.poll-dot.active { background: var(--green); }
.poll-dot.stopped { background: var(--text3); }
.poll-toggle {
  background: none; border: 1px solid var(--border); color: var(--text3);
  padding: 1px 7px; border-radius: 3px; cursor: pointer;
  font-size: 0.9em; font-family: var(--font); transition: all 0.12s;
}
.poll-toggle:hover { background: var(--surface2); color: var(--text2); }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ═══ Settings form ═══ */
.settings-panel { max-width: 1200px; margin: 0 auto; }

.settings-section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 16px; margin-bottom: 12px;
}
.settings-section-title {
  font-size: 0.78em; color: var(--text3); text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 10px; font-weight: 600;
}
.settings-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
}
.settings-row label {
  font-size: 0.78em; color: var(--text2); min-width: 80px; flex-shrink: 0;
}
.settings-row input, .settings-row select {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  padding: 6px 9px; font-size: 0.82em; font-family: var(--font-ui);
  outline: none; transition: border-color 0.2s;
}
.settings-row input:focus, .settings-row select:focus { border-color: var(--accent); }
.settings-row .color-preview {
  width: 22px; height: 22px; border-radius: 4px; border: 1px solid var(--border);
  flex-shrink: 0; cursor: pointer;
}
.settings-row .color-input { max-width: 90px; font-family: var(--font); font-size: 0.8em; }

/* Agent config grid (horizontal wrap) */
.agent-config-grid {
  display: flex; flex-wrap: wrap; gap: 10px;
}
.agent-config-grid .agent-config {
  flex: 1 1 260px; min-width: 240px;
}

/* Agent config card */
.agent-config {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 12px;
  transition: border-color 0.2s;
}
.agent-config:hover { border-color: var(--text3); }
.agent-config-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 7px; padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.agent-config-name {
  font-weight: 600; font-size: 0.82em; display: flex; align-items: center; gap: 6px;
}
.agent-config-name .dot { width: 8px; height: 8px; border-radius: 50%; }
.agent-config-icon {
  font-size: 1.1em; flex-shrink: 0;
}
.agent-config .del-btn {
  background: none; border: 1px solid var(--border); color: var(--red);
  padding: 2px 7px; border-radius: var(--radius-sm); cursor: pointer;
  font-size: 0.7em; transition: all 0.15s;
}
.agent-config .del-btn:hover { background: rgba(255,107,107,0.1); border-color: var(--red); }

.form-grid {
  display: grid; grid-template-columns: 1fr; gap: 4px;
}

/* Wakeup section */
.wakeup-section { margin-top: 7px; padding-top: 7px; border-top: 1px solid var(--border); }
.wakeup-label {
  font-size: 0.68em; color: var(--text3); text-transform: uppercase;
  letter-spacing: 0.3px; margin-bottom: 4px;
}
.wakeup-field { margin-bottom: 4px; }
.wakeup-field label {
  display: block; font-size: 0.68em; color: var(--text3); margin-bottom: 1px;
}
.wakeup-field input, .wakeup-field select, .wakeup-field textarea {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  padding: 4px 6px; font-size: 0.76em; font-family: var(--font-ui);
  outline: none; transition: border-color 0.2s;
}
.wakeup-field input:focus, .wakeup-field select:focus, .wakeup-field textarea:focus {
  border-color: var(--accent);
}
.wakeup-field textarea { min-height: 44px; resize: vertical; font-family: var(--font); font-size: 0.72em; }

/* Header key-value rows */
.kv-row {
  display: flex; gap: 4px; align-items: center; margin-bottom: 3px;
}
.kv-row input { flex: 1; }
.kv-del {
  background: none; border: 1px solid transparent; color: var(--text3);
  padding: 2px 5px; border-radius: 3px; cursor: pointer; font-size: 0.8em;
  transition: all 0.12s;
}
.kv-del:hover { color: var(--red); border-color: var(--border); }
.add-header-btn {
  background: none; border: 1px dashed var(--border); color: var(--text3);
  padding: 3px 10px; border-radius: var(--radius-sm); cursor: pointer;
  font-size: 0.75em; margin-top: 3px; transition: all 0.15s;
}
.add-header-btn:hover { border-color: var(--text3); color: var(--text2); }

/* Auth section (collapsible) */
.auth-section { margin-top: 6px; }
.auth-toggle {
  background: none; border: 1px solid var(--border); color: var(--text3);
  padding: 3px 10px; border-radius: var(--radius-sm); cursor: pointer;
  font-size: 0.75em; transition: all 0.15s; font-family: var(--font-ui);
}
.auth-toggle:hover { border-color: var(--text3); color: var(--text2); }
.auth-fields { margin-top: 6px; padding-left: 8px; border-left: 2px solid var(--border); }
.auth-fields.hidden { display: none; }

/* Global section */
.global-section { margin-bottom: 16px; }

/* Action bar */
.settings-actions {
  display: flex; align-items: center; gap: 8px; margin-top: 14px;
  padding-top: 12px; border-top: 1px solid var(--border);
}
.save-btn {
  background: var(--accent); border: none; color: #fff;
  padding: 8px 20px; border-radius: var(--radius-sm); cursor: pointer;
  font-size: 0.85em; font-family: var(--font-ui); font-weight: 500;
  transition: opacity 0.15s;
}
.save-btn:hover { opacity: 0.9; }
.save-btn:disabled { opacity: 0.4; cursor: default; }
.add-agent-btn {
  background: var(--surface2); border: 1px dashed var(--border); color: var(--text2);
  padding: 8px 16px; border-radius: var(--radius-sm); cursor: pointer;
  font-size: 0.82em; font-family: var(--font-ui);
  transition: all 0.15s;
}
.add-agent-btn:hover { border-color: var(--text3); color: var(--text); }
.save-status {
  font-size: 0.78em; margin-left: auto; min-height: 1.2em;
}
.save-status.ok { color: var(--green); }
.save-status.error { color: var(--red); }

/* Body template editor */
.body-editor {
  min-height: 60px; font-family: var(--font) !important; font-size: 0.75em !important;
  line-height: 1.5; white-space: pre;
}

@media (max-width: 600px) {
  .header { padding: 8px 12px; gap: 10px; flex-wrap: wrap; }
  .header-left { width: 100%; }
  .header-right { position: absolute; top: 8px; right: 12px; }
  .tab-bar { order: 2; flex-basis: 100%; justify-content: flex-start; overflow-x: auto; }
  .tab-btn { padding: 8px 12px; font-size: 0.78em; }
  .compose-bar { padding: 6px 12px; flex-wrap: wrap; }
  .compose-bar input { max-width: 100%; }
  .main-content { padding: 0; }
  .tab-pane { padding: 12px; }
  .msg-bubble { max-width: 85%; }
  .cards-bar { grid-template-columns: 1fr; }
  .discover-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <span class="logo">agent-bridge</span>
    <span class="header-sub">控制中心</span>
  </div>
  <div class="tab-bar" aria-label="主导航">
    <button class="tab-btn active" data-tab="chat">💬 聊天</button>
    <button class="tab-btn" data-tab="activity">📡 活动</button>
    <button class="tab-btn" data-tab="agent">Agent</button>
    <button class="tab-btn" data-tab="settings">⚙ 设置</button>
  </div>
  <div class="header-right">
    <button class="theme-toggle" id="themeToggle" type="button" title="切换明暗色模式" aria-label="切换明暗色模式">☀</button>
  </div>
</header>

<div class="config-banner" id="configBanner"></div>

<div class="main-content">

  <!-- ═══ Chat pane ═══ -->
  <div class="tab-pane active" id="pane-chat">

    <!-- Room grid view (default) -->
    <div id="roomGridView" class="room-grid-view">
      <div class="room-grid-header">
        <h2 class="room-grid-title">聊天室</h2>
      </div>
      <div id="roomGrid" class="room-grid">
        <div class="empty-state"><div class="icon">💬</div><h3>加载中…</h3></div>
      </div>
    </div>

    <!-- Room conversation view (hidden by default) -->
    <div id="roomConvView" class="room-conv-view" style="display:none">
      <div class="conv-header">
        <button class="back-btn" id="backToRooms">← 聊天室</button>
        <span id="convRoomName" class="conv-room-name"></span>
        <div id="convAgentBadges" class="conv-agent-badges"></div>
      </div>
      <div class="chat-area">
        <div class="compose-bar">
          <select id="composeAgent"></select>
          <input type="text" id="composeInput" placeholder="输入消息，按 Enter 发送…" />
          <button class="compose-btn" id="composeBtn">发送→</button>
        </div>
        <div class="chat-controls">
          <input class="chat-search" id="searchInput" type="text" placeholder="搜索消息…" />
          <button class="tool-btn" id="refreshBtn" title="刷新">⟳</button>
        </div>
        <div id="chatArea"></div>
      </div>
    </div>

  </div>
  </div>

  <!-- ═══ Agent pane ═══ -->
  <div class="tab-pane" id="pane-agent">
    <div class="agent-area" id="agentArea">
      <div class="empty-state">加载中…</div>
    </div>
  </div>

  <!-- ═══ Activity pane ═══ -->
  <div class="tab-pane" id="pane-activity">
    <div class="activity-timeline" id="activityArea">
      <div class="activity-empty">
        <div class="icon" style="font-size:2.5em;opacity:0.4">📡</div>
        <h3 style="color:var(--text2);font-weight:500;margin-top:8px;font-size:1em">暂无活动记录</h3>
      </div>
    </div>
  </div>

  <!-- ═══ Settings pane ═══ -->
  <div class="tab-pane" id="pane-settings">
    <div class="settings-area" id="settingsArea">
      <div class="empty-state">
        <div class="icon" style="font-size:2.5em;opacity:0.4">⚙</div>
        <h3 style="color:var(--text2);font-weight:500;margin-top:8px;font-size:1em">加载设置…</h3>
      </div>
    </div>
  </div>

</div>

<footer class="footer">
  <div class="footer-left">
    <span>消息</span>
    <span class="footer-stat" id="statCount">—</span>
    <span class="footer-stat" id="statLast"></span>
  </div>
  <div class="footer-right">
    <span class="poll-dot" id="pollDot"></span>
    <span id="pollLabel">轮询</span>
    <button class="poll-toggle" id="pollBtn">∥</button>
  </div>
</footer>

<script>
// ============================================================
//  Agent Bridge · Control Center
// ============================================================

const VALID_ID_RE = /^[a-zA-Z0-9_-]+$/;

let state = {
  messages: [], agents: [], agentIds: [], agentMap: {}, agentAlias: {},
  discoveredAgents: null,
  archive: '__active__', searchQuery: '',
  autoRefresh: true, pollInterval: null, pollStatusTimer: null,
  editingBadge: null, popupCloseHandler: null,
  activeTab: 'chat',
  rooms: [], currentRoomId: null, chatView: 'grid',
};

const $ = s => document.querySelector(s);
const chatArea = $('#chatArea');
const searchInput = $('#searchInput');
const refreshBtn = $('#refreshBtn');
const backToRoomsBtn = $('#backToRooms');
const discoverEl = () => $('#discoveredAgents');
const scanAgentsBtn = null;
const composeAgent = $('#composeAgent');
const composeInput = $('#composeInput');
const composeBtn = $('#composeBtn');
const statCount = $('#statCount');
const statLast = $('#statLast');
const pollDot = $('#pollDot');
const pollLabel = $('#pollLabel');
const pollBtn = $('#pollBtn');
const activityArea = $('#activityArea');
const configBanner = $('#configBanner');
const themeToggle = $('#themeToggle');

// ═══ Theme ═══
const THEME_KEY = 'agentBridgeTheme';

function currentTheme() {
  return document.documentElement.dataset.theme === 'light' ? 'light' : 'dark';
}

function applyTheme(theme) {
  const next = theme === 'light' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  if (themeToggle) {
    themeToggle.textContent = next === 'light' ? '☾' : '☀';
    themeToggle.title = next === 'light' ? '切换到暗色模式' : '切换到亮色模式';
    themeToggle.setAttribute('aria-label', themeToggle.title);
  }
}

function saveTheme(theme) {
  try { localStorage.setItem(THEME_KEY, theme); } catch (e) {}
}

applyTheme(currentTheme());
if (themeToggle) {
  themeToggle.addEventListener('click', () => {
    const next = currentTheme() === 'light' ? 'dark' : 'light';
    applyTheme(next);
    saveTheme(next);
  });
}

// ═══ API ═══
async function apiGet(p) { try { const r = await fetch(p); return await r.json(); } catch(e) { return null; } }
async function apiPost(p, d) {
  try { const r = await fetch(p, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d)}); return await r.json(); }
  catch(e) { return null; }
}

// ═══ Config ═══
async function loadConfig() {
  const data = await apiGet('/api/config');
  if (!data || !data.ok) return;
  const agents = data.agents || [];
  state.agents = agents;
  state.fullAgents = agents; // full data including cursor, filter_from, wakeup
  state.agentIds = agents.map(a => a.id);
  const newMap = {};
  for (const a of agents) newMap[a.id] = {display_name: a.display_name || a.id, color: a.color || '#8888a0'};
  const oldAliases = state.agentAlias || {};
  state.agentAlias = {};
  for (const [oldId, info] of Object.entries(oldAliases)) {
    const cur = newMap[info.id] || newMap[oldId];
    if (cur) state.agentAlias[oldId] = {...cur, id: info.id || oldId};
  }
  state.agentMap = newMap;
  renderBadges();
  renderComposeSelect();
  renderConfigBanner(data);
}

function getConfigIssues(data) {
  const agents = data.agents || [];
  const ids = new Set(agents.map(a => a.id).filter(Boolean));
  const issues = [];
  if (!data.shared_dir) issues.push('共享目录未设置');
  if (!agents.length) issues.push('至少添加一个 Agent');
  if (!data.agent_id) issues.push('选择本机角色');
  else if (!ids.has(data.agent_id)) issues.push(`本机角色 ${data.agent_id} 不在 Agent 列表中`);
  for (const a of agents) {
    const name = a.display_name || a.id || '未命名 Agent';
    if (!a.id) issues.push(`${name}: Agent ID 不能为空`);
    if (a.sample) {
      issues.push(`${name}: 示例 Agent，需替换为真实 Agent`);
      continue;
    }
    if (!a.wakeup || !a.wakeup.url) issues.push(`${name}: 填写 Webhook URL`);
    if (!a.wakeup || !a.wakeup.body_template) issues.push(`${name}: 确认消息体模板`);
  }
  return issues;
}

function renderConfigBanner(data) {
  const issues = getConfigIssues(data);
  if (!issues.length) {
    configBanner.className = 'config-banner';
    configBanner.innerHTML = '';
    return;
  }
  configBanner.className = 'config-banner show';
  configBanner.innerHTML = `<span>还需要完成 ${issues.length} 个配置项：${esc(issues.slice(0, 2).join('；'))}${issues.length > 2 ? '…' : ''}</span><button onclick="switchToAgent()">去配置</button>`;
}

function switchToAgent() {
  const btn = document.querySelector('.tab-btn[data-tab="agent"]');
  if (btn) btn.click();
}

// ═══ Badges (agent tab) ═══
function renderBadges() {
  const container = $('#agentBadgeContainer');
  if (!container) return;
  container.innerHTML = '';
  for (const a of state.agents) {
    const el = document.createElement('div');
    el.className = 'agent-badge'; el.dataset.agentId = a.id;
    el.innerHTML = `<span class="agent-dot" style="background:${a.color}"></span><span>${esc(a.display_name||a.id)}</span>${a.sample ? '<span class="discover-pill sample">示例</span>' : ''}`;
    el.addEventListener('click', e => { e.stopPropagation(); openEditPopup(el, a); });
    container.appendChild(el);
  }
}

async function loadDiscoveredAgents() {
  const el = discoverEl();
  if (!el) return;
  el.innerHTML = '<div class="discover-empty">扫描中…</div>';
  const data = await apiGet('/api/agents/discover');
  if (!data || !data.ok) {
    el.innerHTML = '<div class="discover-empty">扫描失败</div>';
    return;
  }
  state.discoveredAgents = data.agents || [];
  renderDiscoveredAgents();
}

function renderDiscoveredAgents() {
  const el = discoverEl();
  if (!el) return;
  const agents = state.discoveredAgents || [];
  if (!agents.length) {
    el.innerHTML = '<div class="discover-empty">未发现本机 Agent</div>';
    return;
  }
  el.innerHTML = '';
  for (const a of agents) {
    const card = document.createElement('div');
    card.className = 'discover-card';
    const status = a.sample ? '示例' : (a.configured ? '已配置' : '未配置');
    const statusClass = a.sample ? ' sample' : (a.configured ? ' configured' : '');
    card.innerHTML = `
      <div class="discover-card-header">
        <span class="discover-name">📡 ${esc(a.display_name || a.id)}</span>
        <span class="discover-pill${statusClass}">${status}</span>
      </div>
      <div class="discover-meta">${esc(a.kind || 'Agent')} · ${esc(a.id)}</div>
      <div class="discover-meta">${esc(a.details || '')}</div>
      <div class="discover-meta">${esc(a.source || '')}</div>`;
    el.appendChild(card);
  }
}

// ═══ Compose select ═══
function renderComposeSelect() {
  // Compose select is now populated per-room in openRoomConversation()
}

composeInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
composeBtn.addEventListener('click', sendMessage);
if (scanAgentsBtn) scanAgentsBtn.addEventListener('click', loadDiscoveredAgents);

async function sendMessage() {
  const aid = composeAgent.value;
  const text = composeInput.value.trim();
  if (!text) return;
  composeBtn.disabled = true;
  const result = await apiPost('/api/send', {agent_id: aid, text});
  composeBtn.disabled = false;
  if (result && result.ok) {
    composeInput.value = '';
    if (state.activeTab === 'chat') loadMessages();
  }
}

// ═══ Edit popup ═══
function openEditPopup(el, agent) {
  closeEditPopup();
  state.editingBadge = agent.id;
  el.classList.add('editing');
  const popup = document.createElement('div');
  popup.className = 'edit-popup open';
  popup.dataset.agentId = agent.id;
  popup.innerHTML = `
    <div class="edit-field">
      <label>Agent ID</label>
      <input type="text" class="edit-id-input" value="${esc(agent.id)}" placeholder="e.g. momo">
      <div class="edit-error-msg"></div>
    </div>
    <div class="edit-field">
      <label>名称</label>
      <input type="text" class="edit-name-input" value="${esc(agent.display_name||agent.id)}" placeholder="Display name">
    </div>
    <div class="edit-field">
      <label>颜色</label>
      <input type="text" class="edit-color-input" value="${agent.color}" placeholder="#rrggbb" style="font-family:var(--font);font-size:0.8em">
    </div>
    <div class="edit-rename-warn" style="display:none">⚠️ 修改 ID 后需同步更新对方配置中的 filter_from</div>
    <div class="edit-popup-actions">
      <button class="edit-btn cancel-btn">取消</button>
      <button class="edit-btn primary save-btn">保存</button>
    </div>
    <div class="edit-status"></div>`;
  el.appendChild(popup);
  const idI = popup.querySelector('.edit-id-input');
  idI.focus(); idI.setSelectionRange(idI.value.length, idI.value.length);
  idI.addEventListener('input', () => {
    popup.querySelector('.edit-rename-warn').style.display = (idI.value.trim() !== agent.id) ? 'block' : 'none';
    validateId(idI);
  });
  popup.querySelector('.save-btn').addEventListener('click', () => saveAgent(agent, popup));
  popup.querySelector('.cancel-btn').addEventListener('click', closeEditPopup);
  popup.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveAgent(agent, popup); if (e.key === 'Escape') closeEditPopup(); });
  });
  setTimeout(() => {
    if (state.popupCloseHandler) document.removeEventListener('click', state.popupCloseHandler);
    state.popupCloseHandler = e => { if (!e.target.closest('.edit-popup') && !e.target.closest('.agent-badge.editing')) closeEditPopup(); };
    document.addEventListener('click', state.popupCloseHandler);
  }, 10);
}

function validateId(i) {
  const err = i.parentElement.querySelector('.edit-error-msg');
  const v = i.value.trim();
  if (!v) { err.textContent = '不能为空'; i.classList.add('field-error'); return false; }
  if (!VALID_ID_RE.test(v)) { err.textContent = '字母、数字、-、_ 仅'; i.classList.add('field-error'); return false; }
  err.textContent = ''; i.classList.remove('field-error'); return true;
}

function closeEditPopup() {
  if (state.popupCloseHandler) { document.removeEventListener('click', state.popupCloseHandler); state.popupCloseHandler = null; }
  document.querySelectorAll('.edit-popup').forEach(e => e.remove());
  document.querySelectorAll('.agent-badge.editing').forEach(e => e.classList.remove('editing'));
  state.editingBadge = null;
}

async function saveAgent(agent, popup) {
  const st = popup.querySelector('.edit-status');
  const idI = popup.querySelector('.edit-id-input');
  const nameI = popup.querySelector('.edit-name-input');
  const colI = popup.querySelector('.edit-color-input');
  const newId = idI.value.trim();
  const newName = nameI.value.trim();
  const newColor = colI.value.trim();
  if (!validateId(idI)) return;
  if (!/^#[0-9a-fA-F]{6}$/.test(newColor)) { st.textContent = '颜色格式 #rrggbb'; st.className='edit-status error'; return; }
  st.textContent = '保存…'; st.className = 'edit-status';
  const payload = state.agents.map(a => {
    if (a.id === agent.id) return {id: newId, old_id: (newId!==agent.id)?agent.id:undefined, display_name: newName||newId, color: newColor};
    return {id: a.id, display_name: a.display_name, color: a.color};
  });
  const r = await apiPost('/api/config', {agents: payload});
  if (r && r.ok) {
    st.textContent = '✓ 已保存'; st.className = 'edit-status ok';
    await loadConfig(); await loadMessages();
    setTimeout(closeEditPopup, 700);
  } else { st.textContent = '失败: '+(r?.error||'unknown'); st.className='edit-status error'; }
}

// ═══ Messages ═══
function resolveAgent(sender) { return state.agentMap[sender] || state.agentAlias[sender] || {display_name:sender,color:'#8888a0'}; }

async function loadMessages() {
  if (state.chatView === 'conversation' && state.currentRoomId) {
    await loadRoomMessages();
    return;
  }
  const p = new URLSearchParams();
  if (state.archive !== '__active__') p.set('archive', state.archive);
  if (state.searchQuery) p.set('q', state.searchQuery);
  p.set('limit','500');
  const data = await apiGet(`/api/messages?${p}`);
  if (!data || !data.ok) return;
  state.messages = data.messages || [];
  // Build aliases
  for (const m of state.messages) {
    const s = m.from; if (!s || state.agentMap[s] || state.agentAlias[s]) continue;
    let best = null, bestScore = 0;
    for (const [kid] of Object.entries(state.agentMap)) {
      if (s.startsWith(kid) || kid.startsWith(s)) { const sc = Math.min(s.length, kid.length); if (sc > bestScore) { bestScore = sc; best = kid; } }
    }
    state.agentAlias[s] = best ? {...state.agentMap[best], id: best} : {display_name: s, color: '#8888a0', id: s};
  }
  renderMessages(); updateStats();
}

function renderMessages() {
  const msgs = state.messages;
  if (!msgs.length) {
    chatArea.innerHTML = '<div class="empty-state"><div class="icon">💬</div><h3>暂无消息</h3><p>等 agent 双方开始通信后，消息将在这里显示。</p></div>';
    return;
  }
  let html = '', lastDate = '';
  for (const m of msgs) {
    const sender = m.from || 'unknown', ts = m.ts || '', date = ts.slice(0,10), time = ts.slice(11,19);
    const text = m.msg || '', source = m._source === 'active' ? '' : `📦 ${m._source}`;
    if (date !== lastDate) { html += `<div class="date-separator"><span>${date}</span></div>`; lastDate = date; }
    const idx = state.agentIds.indexOf(sender);
    const side = (idx >=0 && state.agentIds.length>=2) ? (idx%2===0?'left':'right') : 'left';
    const info = resolveAgent(sender), color = info.color;
    html += `<div class="message-group ${side}">
      <div class="msg-avatar ${side}" style="background:${color}22;color:${color};border-color:${color}44">${esc(sender[0].toUpperCase())}</div>
      <div class="msg-bubble ${side}">
        <div class="msg-header">
          <span class="msg-sender" style="color:${color}">${esc(info.display_name)}</span>
          <span class="msg-time">${time}</span>
          ${source?`<span class="msg-source">${source}</span>`:''}
        </div>
        <div class="msg-text">${esc(text)}</div>
      </div></div>`;
  }
  chatArea.innerHTML = html;
}

function updateStats() {
  const ms = state.messages;
  statCount.textContent = ms.length;
  statLast.textContent = ms.length ? '· 最后 ' + (ms[ms.length-1].ts||'').slice(11,19) : '';
}

function renderRoomGrid() {

  html += `<div class="agent-source-panel" style="grid-column:1/-1">
    <div class="agent-source-panel-title">拖拽 Agent 到聊天室</div>
    <div class="agent-source-list">

    html += `<div class="room-card ${statusClass}" data-room-id="${escAttr(room.id)}" onclick="openRoomConversation('${escAttr(room.id)}')">

function renderAgentSlots(room) {
  const agents = state.agents || [];
  let html = '';
  for (let slot = 0; slot < 2; slot++) {
    const agentId = room.agents[slot];
    const agent = agentId ? agents.find(a => a.id === agentId) : null;
    if (agent) {
      html += `<div class="room-agent-slot occupied" data-room-id="${escAttr(room.id)}" data-slot="${slot}">
        <div class="agent-chip">
          <span class="dot" style="background:${agent.color}"></span>
          ${esc(agent.display_name || agent.id)}
        </div>
      </div>`;
    } else {
      html += `<div class="room-agent-slot" data-room-id="${escAttr(room.id)}" data-slot="${slot}">
        <div class="slot-hint">拖入 Agent</div>
      </div>`;
    }
  }
  return html;
}

function setupDragAndDrop() {
  document.querySelectorAll('.agent-drag-chip').forEach(chip => {
    chip.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', chip.dataset.agentId);
      e.dataTransfer.effectAllowed = 'move';
      chip.classList.add('dragging');
    });
    chip.addEventListener('dragend', () => {
      chip.classList.remove('dragging');
      document.querySelectorAll('.room-agent-slot').forEach(s => s.classList.remove('drag-over'));
    });
  });
  document.querySelectorAll('.room-agent-slot').forEach(slot => {
    slot.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      slot.classList.add('drag-over');
    });
    slot.addEventListener('dragleave', () => {
      slot.classList.remove('drag-over');
    });
    slot.addEventListener('drop', e => {
      e.preventDefault();
      slot.classList.remove('drag-over');
      const agentId = e.dataTransfer.getData('text/plain');
      const roomId = slot.dataset.roomId;
      const slotIdx = parseInt(slot.dataset.slot);
      assignAgentToRoom(roomId, slotIdx, agentId);
    });
  });
}

async function assignAgentToRoom(roomId, slotIndex, agentId) {
  const room = state.rooms.find(r => r.id === roomId);
  if (!room) return;

  // Check if agent is already in another room
  for (const r of state.rooms) {
    if (r.agents.includes(agentId) && r.id !== roomId) {
      alert(`Agent 已在聊天室「${r.name || r.id}」中，请先移除。`);
      return;
    }
  }

  const agents = [...room.agents];
  while (agents.length <= slotIndex) agents.push('');
  agents[slotIndex] = agentId;
  const cleanAgents = agents.filter(Boolean);

  const result = await apiPost('/api/rooms', {
    id: roomId,
    name: room.name,
    agents: cleanAgents,
  });

  if (result && result.ok) {
    await loadRooms();
    await loadConfig();
  } else if (result) {
    alert(result.error || '操作失败');
  }
}

function addRoom() {
  const name = prompt('聊天室名称：');
  if (!name || !name.trim()) return;
  apiPost('/api/rooms', { name: name.trim(), agents: [] }).then(result => {
    if (result && result.ok) loadRooms();
    else if (result) alert(result.error || '创建失败');
  });
}

async function deleteRoom(roomId) {
  if (!confirm('确认删除此聊天室？')) return;
  const result = await apiPost('/api/rooms/delete', { id: roomId });
  if (result && result.ok) {
    if (state.currentRoomId === roomId) showRoomGrid();
    await loadRooms();
    await loadConfig();
  }
}

function openRoomConversation(roomId) {
  const room = state.rooms.find(r => r.id === roomId);
  if (!room) return;

  state.currentRoomId = roomId;
  state.chatView = 'conversation';

  const gridView = $('#roomGridView');

  if (convView) convView.style.display = 'block';

  const convName = $('#convRoomName');
  if (convName) convName.textContent = room.name || room.id;

  // Show agent badges
  const agents = state.agents || [];
  const badges = $('#convAgentBadges');
  if (badges) {
    badges.innerHTML = room.agents.map(aid => {
      const a = agents.find(x => x.id === aid);

      return `<span class="conv-agent-badge"><span class="dot" style="background:${a.color}"></span>${esc(a.display_name || aid)}</span>`;

}

async function loadActivity() {

    activityArea.innerHTML = '<div class="activity-empty"><div style="font-size:2.5em;opacity:0.4">📡</div><h3 style="color:var(--text2);font-weight:500;margin-top:8px;font-size:1em">暂无活动记录</h3><p style="color:var(--text3);font-size:0.85em;margin-top:4px">轮询运行后这里会显示检查结果。</p></div>';

    else if (h.delivered) { icon = '→'; title = `发送 ${h.new_msgs} 条消息给 ${h.to_agent}`; detail = '已投递'; }
    else if (h.error) { icon = '✗'; title = '轮询失败'; detail = h.error; cls = 'error'; }

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return esc(s); }

function bodyTemplateToText(bt) {
  if (!bt) return '{}';
  if (typeof bt === 'string') return bt;
  try { return JSON.stringify(bt, null, 2); } catch(e) { return String(bt); }
}

function textToBodyTemplate(text) {
  if (!text || !text.trim()) return {};
  const t = text.trim();
  try { return JSON.parse(t); } catch(e) { return t; }
}

function headersToArray(h) {
  if (!h || typeof h !== 'object') return [];
  return Object.entries(h).map(([k, v]) => ({k, v}));
}

function arrayToHeaders(arr) {
  const h = {};
  for (const item of arr) {
    if (item.k && item.k.trim()) h[item.k.trim()] = item.v;
  }
  return h;
}

function applyBodyPreset(selectEl) {
  const val = selectEl.value;
  if (!val) return; // '-- 选择模板 --' selected, no action
  const textarea = selectEl.parentElement.querySelector('.wu-body');
  if (!textarea) return;
  try {
    const obj = JSON.parse(val);
    textarea.value = JSON.stringify(obj, null, 2);
  } catch(e) {
    textarea.value = val;
  }
}

function authTypeChange(sel) {
  const fields = sel.parentElement.querySelector('.auth-fields');
  if (sel.value === 'bearer') { fields.classList.remove('hidden'); }
  else { fields.classList.add('hidden'); }
}

function addHeader(btn, idx) {

function collectAgentData(container) {
  const idx = container.dataset.agentIdx;
  const id = container.querySelector('.ag-id').value.trim();
  const displayName = container.querySelector('.ag-name').value.trim();
  const color = container.querySelector('.ag-color').value.trim();
  const cursor = container.querySelector('.ag-cursor').value;

  const wuSection = container.querySelector('.wakeup-section');
  const url = wuSection ? wuSection.querySelector('.wu-url').value.trim() : '';
  const method = wuSection ? wuSection.querySelector('.wu-method').value : 'POST';
  const authType = wuSection ? wuSection.querySelector('.wu-auth-type').value : 'none';
  const tokenPath = wuSection ? wuSection.querySelector('.wu-token-path')?.value.trim() || '' : '';
  const tokenJsonpath = wuSection ? wuSection.querySelector('.wu-token-jsonpath')?.value.trim() || '' : '';
  
  const headers = {};
  if (wuSection) {
    wuSection.querySelectorAll('.kv-row').forEach(row => {
      const k = row.querySelector('.header-key')?.value.trim();
      const v = row.querySelector('.header-val')?.value.trim();
      if (k) headers[k] = v || '';
    });
  }
  
  const bodyText = wuSection ? wuSection.querySelector('.wu-body')?.value || '' : '';
  const bodyTemplate = textToBodyTemplate(bodyText);
  
  const wakeup = {url, method, headers, body_template: bodyTemplate};
  if (authType === 'bearer' && tokenPath) {
    wakeup.auth = {type: 'bearer', token_path: tokenPath, token_jsonpath: tokenJsonpath};
  }
  
  return {id, display_name: displayName || id, color, cursor, filter_from: "", wakeup};
}

          <label>游标类型</label>

            <option value="line" ${(a.cursor||'line')==='line'?'selected':''}>line（行号）</option>
            <option value="timestamp" ${a.cursor==='timestamp'?'selected':''}>timestamp（时间戳）</option>
          </select>
        </div>
      </div>
      ${renderWakeupHtml(a.wakeup, i)}
    </div>`;
  }

  area.innerHTML = `<div class="settings-panel">
    ${checklistHtml}
    <div class="badge-list agent-page-badges" id="agentBadgeContainer"></div>
    <div class="agent-config-grid">${agentHtml}</div>
    <div class="settings-actions">
      <button class="add-agent-btn" onclick="addAgent()">＋ 添加 Agent</button>
      <button class="save-btn" onclick="saveFullConfig()">💾 保存配置</button>
      <span class="save-status" id="saveStatus"></span>
    </div>
    <div class="agent-section" style="margin-top:24px">
      <div class="agent-section-header">
        <div class="agent-section-title">本机发现</div>
        <button class="scan-btn" id="scanAgentsBtn" type="button" onclick="loadDiscoveredAgents()">重新扫描</button>
      </div>
      <div class="discover-grid" id="discoveredAgents"></div>
    </div>
  </div>`;
}

function addAgent() {
  const area = $('#agentArea');
  const container = area.querySelector('.settings-panel');
  if (!container) return;
  
  const agents = container.querySelectorAll('.agent-config');
  const idx = agents.length;
  
  const card = document.createElement('div');
  card.className = 'agent-config';
  card.dataset.agentIdx = idx;
  card.innerHTML = `<div class="agent-config-header">
    <div class="agent-config-name">
      <span class="agent-config-icon">🤖</span>
      <span class="dot" style="background:#8888a0"></span>
      新 Agent
    </div>
    <button class="del-btn" onclick="removeAgent(this)" title="删除此 Agent">🗑</button>
  </div>
  <div class="form-grid">
    <div class="wakeup-field">
      <label>Agent ID</label>
      <input type="text" class="ag-id" value="" placeholder="e.g. momo" />
    </div>
    <div class="wakeup-field">
      <label>显示名称</label>
      <input type="text" class="ag-name" value="" placeholder="Display name" />
    </div>
    <div class="wakeup-field">
      <label>颜色</label>
      <div style="display:flex;gap:6px;align-items:center">
        <span class="color-preview" style="background:#8888a0" onclick="this.nextElementSibling.click()"></span>
        <input type="text" class="ag-color" value="#8888a0" placeholder="#rrggbb" style="max-width:90px;font-family:var(--font);font-size:0.8em" oninput="this.previousElementSibling.style.background=this.value" />
      </div>
    </div>
    <div class="wakeup-field">
      <label>游标类型</label>
      <select class="ag-cursor">
        <option value="line" selected>line（行号）</option>
        <option value="timestamp">timestamp（时间戳）</option>
      </select>
    </div>
  </div>
  ${renderWakeupHtml({}, idx)}`;
  
  const grid = container.querySelector('.agent-config-grid');
  if (grid) grid.appendChild(card);
  card.scrollIntoView({behavior:'smooth', block:'center'});
}

function removeAgent(btn) {
  if (!confirm('确认删除此 Agent？')) return;
  btn.closest('.agent-config').remove();
}

async function saveFullConfig() {
  const status = $('#saveStatus');
  status.textContent = '保存中…';
  status.className = 'save-status';
  
  const area = $('#agentArea');
  const container = area.querySelector('.settings-panel');
  if (!container) { status.textContent = '表单未加载'; status.className = 'save-status error'; return; }

  const agentCards = container.querySelectorAll('.agent-config-grid .agent-config');
  const agents = [];
  const errors = [];
  
  for (const card of agentCards) {
    const data = collectAgentData(card);
    if (!data.id) { errors.push('Agent ID 不能为空'); continue; }
    if (!/^[a-zA-Z0-9_-]+$/.test(data.id)) { errors.push(`无效 ID: ${data.id}`); continue; }
    if (!/^#[0-9a-fA-F]{6}$/.test(data.color)) { errors.push(`颜色格式错误: ${data.id}`); continue; }
    agents.push(data);
  }
  
  if (errors.length) {
    status.textContent = errors.join('; ');
    status.className = 'save-status error';
    return;
  }
  
  if (!agents.length) {
    status.textContent = '至少需要一个 Agent';
    status.className = 'save-status error';
    return;
  }
  
  const agentId = ( $('#settingsAgentId') || {} ).value;
  
  const r = await apiPost('/api/config/full', {
    agents: agents,
    agent_id: agentId,
  });
  
  if (r && r.ok) {
    status.textContent = '✓ 配置已保存';
    status.className = 'save-status ok';
    await loadConfig(); // Refresh badges and cards
    await loadDiscoveredAgents();
    setTimeout(() => { status.textContent = ''; }, 3000);
  } else {
    status.textContent = '保存失败: ' + (r?.error || '服务器错误');
    status.className = 'save-status error';
  }
}

// ═══ Poll control ═══
async function loadPollStatus() {
  const d = await apiGet('/api/poll');
  if (!d || !d.ok) return;
  const run = d.running;
  pollDot.className = 'poll-dot ' + (run ? 'active' : 'stopped');
  pollLabel.textContent = run ? '轮询中' : '已暂停';
  pollBtn.textContent = run ? '∥' : '▶';
}
pollBtn.addEventListener('click', async () => {
  const d = await apiGet('/api/poll');
  if (d && d.running) await apiPost('/api/poll/stop', {});
  else await apiPost('/api/poll/start', {});
  await loadPollStatus();
});
pollBtn.addEventListener('dblclick', async () => {
  const r = await apiPost('/api/poll/now', {});
  if (r && r.ok) { await refreshAll(); await loadActivity(); }
});

// ═══ Tab switching ═══
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    const pane = document.getElementById('pane-' + btn.dataset.tab);
    if (pane) pane.classList.add('active');
    state.activeTab = btn.dataset.tab;
    // Lazy load
    if (btn.dataset.tab === 'chat') { loadRooms(); if (state.chatView === 'conversation') loadMessages(); }
    if (btn.dataset.tab === 'activity') loadActivity();
    if (btn.dataset.tab === 'agent') loadAgentConfig();
    if (btn.dataset.tab === 'settings') loadSettings();
  });
});

// ═══ Auto refresh ═══
function startAutoRefresh() {
  stopAutoRefresh();
  state.pollInterval = setInterval(() => { if (!document.hidden) refreshAll(); }, 5000);
  state.pollStatusTimer = setInterval(() => { if (!document.hidden) loadPollStatus(); }, 3000);
}
function stopAutoRefresh() {
  if (state.pollInterval) { clearInterval(state.pollInterval); state.pollInterval = null; }
  if (state.pollStatusTimer) { clearInterval(state.pollStatusTimer); state.pollStatusTimer = null; }
}
document.addEventListener('visibilitychange', () => { if (!document.hidden && state.autoRefresh) refreshAll(); });
async function refreshAll() { await Promise.all([loadConfig(), loadMessages(), loadRooms(), loadStatus(), loadPollStatus()]); }
async function loadStatus() {
  const d = await apiGet('/api/status');
  if (!d || !d.ok) return;
  statCount.textContent = d.active.count;
}

// ═══ Init ═══
function checkProtocol() {
  if (location.protocol === 'file:') {
    document.body.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#1a1a2e;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,sans-serif">
        <div style="text-align:center;max-width:480px;padding:32px">
          <div style="font-size:3em;margin-bottom:16px">⚠️</div>
          <h2 style="font-size:1.3em;font-weight:600;margin:0 0 12px">不能直接打开 HTML 文件</h2>
          <p style="color:#8888a0;line-height:1.6;margin:0 0 20px">
            此页面需要后端 API 支持。<br>
            请通过 server.py 启动后访问：
          </p>
          <code style="display:block;background:#0f0f23;padding:12px 16px;border-radius:8px;font-family:monospace;font-size:0.85em;color:#4ecdc4;text-align:left">
            cd ~/Documents/Project/agent-bridge<br>
            python3 ui/server.py --dir ~/.shared-chat
          </code>
          <p style="color:#8888a0;line-height:1.6;margin:16px 0 0;font-size:0.85em">
            然后浏览器打开 <a href="http://127.0.0.1:7899" style="color:#4ecdc4">http://127.0.0.1:7899</a>
          </p>
        </div>
      </div>`;
    return false;
  }
  return true;
}
if (checkProtocol()) {
  (async function init() {
    await loadConfig();
    await loadDiscoveredAgents();
    await loadRooms();
    await refreshAll();
    startAutoRefresh();
    loadPollStatus();
  })();
}
</script>
</body>
